<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udhaya Netram Live E-Paper</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
.header{
  background:#b30000;color:white;
  text-align:center;padding:18px;
  font-size:28px;font-weight:bold;
}
.container{width:90%;margin:auto;padding:15px}
.card{background:white;padding:15px;margin:10px 0;border-radius:8px}
input,button{width:100%;padding:10px;margin:6px 0}
button{background:#b30000;color:white;border:none;cursor:pointer}
button:hover{background:#800000}
.news-item{
  padding:10px;border-bottom:1px solid #ddd;
  cursor:pointer;
}
.news-item:hover{background:#f1f1f1}
iframe{width:100%;height:500px;border:none}
small{color:gray}
</style>
</head>

<body>

<div class="header">UDHAYA NETRAM LIVE NEWS</div>

<div class="container">

<!-- NEWS LIST -->
<div class="card">
<h2>Latest News (Live)</h2>
<div id="newsList">Loading...</div>
</div>

<!-- EPAPER VIEWER -->
<div class="card">
<h2>E-Paper Viewer</h2>
<iframe id="viewer"></iframe>
</div>

<!-- ADMIN -->
<div class="card">
<h2>Admin Upload</h2>
<input type="text" id="title" placeholder="News Title">
<input type="file" id="file" accept="application/pdf">
<button onclick="uploadNews()">Upload PDF</button>
<small>If upload fails, check Firebase rules + config</small>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

/* 🔥 STEP 1: YOUR FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* ================= LIVE NEWS LOAD ================= */
db.collection("news")
.orderBy("time","desc")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
        let data = doc.data();

        html += `
        <div class="news-item" onclick="openPDF('${data.url}')">
            📰 ${data.title}
        </div>`;
    });

    document.getElementById("newsList").innerHTML = html || "No news found";
});

/* ================= OPEN PDF ================= */
function openPDF(url){
    document.getElementById("viewer").src = url;
}

/* ================= UPLOAD PDF ================= */
function uploadNews(){

    let title = document.getElementById("title").value.trim();
    let file = document.getElementById("file").files[0];

    if(!title || !file){
        alert("Please fill all fields");
        return;
    }

    let fileName = Date.now() + "_" + file.name;
    let ref = storage.ref("pdfs/" + fileName);

    let uploadTask = ref.put(file);

    uploadTask.on("state_changed",

        // progress
        (snapshot)=>{
            let percent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            console.log("Upload: " + percent.toFixed(2) + "%");
        },

        // error
        (error)=>{
            alert("Upload Failed: " + error.message);
        },

        // success
        ()=>{
            uploadTask.snapshot.ref.getDownloadURL()
            .then(url=>{

                db.collection("news").add({
                    title: title,
                    url: url,
                    time: Date.now()
                });

                alert("Upload Successful!");
                document.getElementById("title").value="";
                document.getElementById("file").value="";
            });
        }
    );
}

</script>

</body>
</html>
