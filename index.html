<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udhaya Netram - Live News</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
.header{
  background:#b30000;color:white;
  text-align:center;padding:20px;font-size:30px;font-weight:bold;
}
.container{width:90%;margin:auto;padding:20px}
.card{background:white;padding:15px;margin:10px 0;border-radius:8px}
input,button{width:100%;padding:10px;margin:5px 0}
button{background:#b30000;color:white;border:none;cursor:pointer}
iframe{width:100%;height:500px;border:none}
.news-item{padding:10px;border-bottom:1px solid #ddd;cursor:pointer}
</style>

</head>

<body>

<div class="header">UDHAYA NETRAM LIVE NEWS</div>

<div class="container">

<h2>Latest News (LIVE)</h2>
<div id="newsList"></div>

<h2>Admin Panel</h2>
<input type="text" id="title" placeholder="News Title">
<input type="file" id="file">
<button onclick="uploadNews()">Upload PDF</button>

<h2>E-Paper</h2>
<iframe id="viewer"></iframe>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
// 🔥 YOUR FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* ================= LIVE LOAD ================= */
db.collection("news").orderBy("time","desc")
.onSnapshot(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
        let data = doc.data();

        html += `
        <div class="news-item" onclick="openPDF('${data.url}')">
            📰 ${data.title}
        </div>`;
    });

    document.getElementById("newsList").innerHTML = html;
});

/* ================= OPEN PDF ================= */
function openPDF(url){
    document.getElementById("viewer").src = url;
}

/* ================= UPLOAD NEWS ================= */
function uploadNews(){
    let title = document.getElementById("title").value;
    let file = document.getElementById("file").files[0];

    if(!title || !file){
        alert("Fill all fields");
        return;
    }

    let uploadTask = storage.ref("pdfs/"+file.name).put(file);

    uploadTask.on("state_changed",
    null,
    (error)=>{ alert(error.message); },
    ()=>{
        uploadTask.snapshot.ref.getDownloadURL()
        .then(url=>{

            db.collection("news").add({
                title:title,
                url:url,
                time:Date.now()
            });

            alert("Uploaded Successfully!");
            document.getElementById("title").value="";
            document.getElementById("file").value="";
        });
    });
}
</script>

</body>
</html>
