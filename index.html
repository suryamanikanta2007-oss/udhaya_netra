<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Udhaya Netram E-Paper</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#b30000;color:white;text-align:center;padding:15px;font-size:22px;}
nav{display:flex;justify-content:center;gap:15px;background:#900;padding:10px;}
nav a{color:white;cursor:pointer;font-weight:bold;}

.container{width:90%;margin:auto;margin-top:20px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}

button{background:#b30000;color:white;padding:8px;border:none;cursor:pointer;margin-top:10px;}
input{width:100%;padding:8px;margin:5px 0;}

.news-item{padding:10px;border-bottom:1px solid #ddd;cursor:pointer;}
.news-item:hover{background:#f2f2f2;}

iframe{width:100%;height:80vh;border:none;}

.section{display:none;}
</style>
</head>

<body>

<header>UDHAYA NETRAM DAILY E-PAPER</header>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('news')">Latest News</a>
<a onclick="show('paper')">E-Paper</a>
<a onclick="show('admin')">Admin</a>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="section card">
<h2>Welcome</h2>
<p>Live Newspaper System - All Devices Sync Automatically</p>
</div>

<!-- NEWS -->
<div id="news" class="section card">
<h2>Latest News</h2>
<div id="newsList"></div>
</div>

<!-- EPAPER -->
<div id="paper" class="section card">
<h2>E-Paper Viewer</h2>
<iframe id="pdfFrame"></iframe>
</div>

<!-- ADMIN -->
<div id="admin" class="section card">
<h2>Admin Panel</h2>

<input id="title" placeholder="News Title">
<input type="file" id="pdfFile">
<button onclick="uploadPDF()">Upload PDF</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>

// 🔴 Firebase Config (PUT YOUR CONFIG HERE)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APPID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* NAV */
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* UPLOAD PDF */
function uploadPDF(){
  let title = document.getElementById("title").value;
  let file = document.getElementById("pdfFile").files[0];

  if(!title || !file){
    alert("Fill all fields");
    return;
  }

  let ref = storage.ref("pdfs/" + file.name);

  ref.put(file).then(snapshot=>{
    return snapshot.ref.getDownloadURL();
  }).then(url=>{
    
    db.collection("news").add({
      title: title,
      pdf: url,
      time: Date.now()
    });

    alert("Uploaded Successfully!");
  });
}

/* REAL TIME LOAD */
db.collection("news").orderBy("time","desc")
.onSnapshot(snapshot=>{
  let box = document.getElementById("newsList");
  box.innerHTML = "";

  snapshot.forEach(doc=>{
    let data = doc.data();

    box.innerHTML += `
      <div class="news-item" onclick="openPDF('${data.pdf}')">
        📰 ${data.title}
      </div>
    `;
  });
});

/* OPEN PDF */
function openPDF(url){
  show('paper');
  document.getElementById("pdfFrame").src = url;
}

show('home');

</script>

</body>
</html>
